[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Security-Policy = "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' https:; connect-src 'self' https:; img-src 'self' data: https:; frame-src https://gumroad.com https://*.gumroad.com;"

[functions]
  node_bundler = "esbuild"
  included_files = ["node_modules/@netlify/blobs/**"]

[functions."analyze"]
  timeout = 60

[functions."analyze-background"]
  type = "background"

[functions."check-result"]
  timeout = 10
