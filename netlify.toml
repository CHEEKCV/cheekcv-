[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.anthropic.com; img-src 'self' data:;"

[functions]
  node_bundler = "esbuild"
  included_files = ["node_modules/@netlify/blobs/**"]

[functions."analyze"]
  timeout = 60

[functions."analyze-background"]
  type = "background"

[functions."check-result"]
  timeout = 10
