[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[functions]
  node_bundler = "esbuild"
  included_files = ["node_modules/@netlify/blobs/**"]

[functions."analyze"]
  timeout = 60

[functions."analyze-background"]
  type = "background"

[functions."check-result"]
  timeout = 10
