<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>جاري التحليل...</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#050816;
color:white;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

canvas{
position:fixed;
inset:0;
z-index:0;
}

.wrap{
position:relative;
z-index:2;
width:min(92%,650px);
text-align:center;
}

.logo{
font-size:42px;
font-weight:900;
margin-bottom:30px;
}

.stage{
font-size:28px;
font-weight:700;
margin-bottom:18px;
line-height:1.6;
}

.teaser{
font-size:18px;
opacity:.8;
margin-bottom:40px;
line-height:1.8;
}

.bar{
height:14px;
background:#1a1f35;
border-radius:999px;
overflow:hidden;
margin-bottom:14px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#f0c93a,#ffd95e);
transition:width .3s ease;
}

.pct{
font-size:22px;
font-weight:800;
color:#f0c93a;
}

@keyframes fadeStage{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:none;
}
}

</style>

</head>

<body>

<canvas id="c"></canvas>

<div class="wrap">

<div class="logo">شيّك</div>

<div class="stage" id="stage">
جاري تحليل سيرتك الذاتية...
</div>

<div class="teaser" id="teaser">
الذكاء الاصطناعي يقرأ ما بين السطور...
</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div class="pct" id="pct">0%</div>

</div>

<script>

// Particles
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = Array.from({length:50},()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5+.3,
vx:(Math.random()-.5)*.3,
vy:(Math.random()-.5)*.3,
o:Math.random()*.4+.05
}));

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle=`rgba(240,201,58,${p.o})`;
ctx.fill();

p.x += p.vx;
p.y += p.vy;

if(p.x<0 || p.x>canvas.width) p.vx *= -1;
if(p.y<0 || p.y>canvas.height) p.vy *= -1;

});

requestAnimationFrame(draw);

}

draw();

const stages = [
"الذكاء الاصطناعي يقرأ ما بين السطور...",
"تحليل طريقة تقديمك لنفسك...",
"اكتشاف إشارات القيادة المخفية... 🔍",
"تحليل احتمالية الاحتراق الوظيفي... 😂",
"مقارنة خبرتك مع طريقة كتابتها...",
"قياس مستوى الـ under-selling في سيرتك...",
"اكتشاف شخصيتك المهنية الحقيقية...",
"تحليل أنك تعمل أكثر مما يقوله منصبك...",
"رصد الفجوة بين قيمتك الحقيقية وراتبك...",
"تسجيل الدرجات بلا رحمة... 💀",
"كتابة الحقيقة القاسية...",
"تحديد الوظائف اللي تستاهلها فعلاً...",
"بناء الحكم النهائي... 🔥"
];

const teasers = [
"جاري فحص سيرتك الذاتية... 👀",
"يبدو أنك تقلل من قيمتك المهنية بشكل خطير 😬",
"الـ AI اكتشف إنك تشتغل بمستوى أعلى من مسماك...",
"احتمالية عالية إنك ما طالبت بحقك يومًا... 💀",
"شيًك شاف شيء في سيرتك ما أحد قاله لك من قبل 👀"
];

let si = 0;
let ti = 0;
let pct = 0;
let apiDone = false;

const fillEl = document.getElementById('fill');
const pctEl = document.getElementById('pct');
const stageEl = document.getElementById('stage');
const teaserEl = document.getElementById('teaser');

function setText(el,txt){

el.style.animation='none';
void el.offsetHeight;
el.style.animation='fadeStage .4s ease';

el.textContent = txt;

}

setInterval(()=>{
setText(stageEl,stages[si % stages.length]);
si++;
},2000);

setInterval(()=>{
setText(teaserEl,teasers[ti % teasers.length]);
ti++;
},3200);

const pctInterval = setInterval(()=>{

if(pct < (apiDone ? 100 : 85)){

pct += Math.random()*2 + .3;

if(!apiDone && pct > 85){
pct = 85;
}

if(pct > 100){
pct = 100;
}

fillEl.style.width = pct + '%';
pctEl.textContent = Math.floor(pct) + '%';

}

if(pct >= 100){

clearInterval(pctInterval);

setTimeout(()=>{

window.location.href='./ascend_paywall.html';

},1500);

}

},300);

async function analyzeCV(){

const cvText = localStorage.getItem('cheek_cv_text');

if(!cvText || cvText.length < 50){

alert('السيرة الذاتية غير موجودة');

window.location.href='./index.html';

return;

}

try{

const response = await fetch('/.netlify/functions/analyze', {

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
cvText
})

});

const result = await response.json();

if(result.error){

console.error(result.error);

alert('فشل التحليل');

return;

}

localStorage.setItem(
'cheek_analysis',
JSON.stringify(result)
);

apiDone = true;

}
catch(err){

console.error(err);

alert('حدث خطأ أثناء التحليل');

}

}

analyzeCV();

</script>

</body>
</html>
