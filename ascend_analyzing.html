```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyzing</title>

<style>

body{
background:#050816;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
margin:0;
padding:20px;
text-align:center;
}

#status{
font-size:28px;
margin-bottom:20px;
}

.loader{
width:70px;
height:70px;
border-radius:50%;
border:4px solid rgba(255,255,255,.1);
border-top:4px solid #F0C93A;
animation:spin 1s linear infinite;
margin-bottom:30px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

</style>

</head>

<body>

<div class="loader"></div>

<h1 id="status">
جاري التحليل...
</h1>

<script>

async function run(){

try{

const cvText =
localStorage.getItem('cheek_cv_text');

if(!cvText){

document.getElementById('status').innerText =
'لا توجد سيرة ذاتية';

return;

}

const response = await fetch(
'/.netlify/functions/analyze',
{
method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
cvText
})

}
);

const text = await response.text();

console.log('RAW RESPONSE:', text);

let result;

try{

result = JSON.parse(text);

}
catch(e){

console.log('JSON ERROR:', e);

document.body.innerHTML = `
<div style="
padding:20px;
max-width:900px;
margin:auto;
text-align:right;
direction:rtl;
">

<h1 style="color:#ff4d4f;">
❌ JSON Parse Error
</h1>

<pre style="
background:#111827;
padding:20px;
border-radius:16px;
overflow:auto;
white-space:pre-wrap;
line-height:1.8;
font-size:14px;
color:#fff;
">
${text}
</pre>

</div>
`;

return;

}

console.log('PARSED RESULT:', result);

if(result.success){

localStorage.setItem(
'cheek_analysis',
JSON.stringify(result)
);

document.getElementById('status').innerText =
'تم التحليل ✅';

setTimeout(()=>{

window.location.href =
'ascend_paywall.html';

},1000);

}
else{

document.body.innerHTML = `
<div style="
padding:20px;
max-width:900px;
margin:auto;
text-align:right;
direction:rtl;
">

<h1 style="color:#ff4d4f;">
❌ API Error
</h1>

<pre style="
background:#111827;
padding:20px;
border-radius:16px;
overflow:auto;
white-space:pre-wrap;
line-height:1.8;
font-size:14px;
color:#fff;
">
${JSON.stringify(result,null,2)}
</pre>

</div>
`;

}

}
catch(err){

console.log(err);

document.body.innerHTML = `
<div style="
padding:20px;
max-width:900px;
margin:auto;
text-align:right;
direction:rtl;
">

<h1 style="color:#ff4d4f;">
❌ Runtime Error
</h1>

<pre style="
background:#111827;
padding:20px;
border-radius:16px;
overflow:auto;
white-space:pre-wrap;
line-height:1.8;
font-size:14px;
color:#fff;
">
${err.message}
</pre>

</div>
`;

}

}

run();

</script>

</body>
</html>
```
