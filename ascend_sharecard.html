<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>شيًك — شارك شخصيتك</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#FAFAF8;
  font-family:'IBM Plex Sans Arabic',-apple-system,sans-serif;
  direction:rtl;color:#1a1a1a;
  min-height:100vh;display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
}

/* NAV */
nav{width:100%;background:#fff;border-bottom:2px solid #1a1a1a;padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-box{width:28px;height:28px;background:#1a1a1a;border-radius:9px;border:2px solid #1a1a1a;display:grid;place-items:center;}
.logo-name{font-size:18px;font-weight:800;color:#1a1a1a;}
.nav-tag{font-size:11px;font-weight:600;color:#8B6914;background:#FFF3CD;border:1.5px solid #F0C93A;border-radius:99px;padding:3px 10px;}

/* MAIN */
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:32px 20px;max-width:480px;margin:0 auto;width:100%;}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:24px;width:100%;}
.tab{flex:1;padding:10px;font-size:13px;font-weight:700;text-align:center;border:2px solid #1a1a1a;border-radius:10px;cursor:pointer;background:#fff;color:#1a1a1a;transition:all .15s;font-family:'IBM Plex Sans Arabic',-apple-system,sans-serif;}
.tab.active{background:#1a1a1a;color:#F0C93A;}

/* CARD WRAPPER */
.card-wrap{width:100%;margin-bottom:20px;}

/* ── DARK CARD ── */
.card-dark{
  background:#0A0A0A;
  border:2px solid #1a1a1a;
  border-radius:20px;
  padding:32px 28px;
  box-shadow:4px 4px 0 #1a1a1a;
  position:relative;overflow:hidden;
  display:none;
}
.card-dark.active{display:block;}
.card-dark::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(240,201,58,.12) 0%,transparent 70%);
  pointer-events:none;
}
.cd-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(240,201,58,.1);border:1px solid rgba(240,201,58,.3);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:600;color:rgba(240,201,58,.8);margin-bottom:20px;}
.cd-name{font-size:36px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:8px;}
.cd-name span{color:#F0C93A;}
.cd-desc{font-size:13px;color:rgba(255,255,255,.9);line-height:1.8;margin-bottom:24px;}
.cd-divider{height:1px;background:rgba(255,255,255,.08);margin-bottom:20px;}
.cd-footer{display:flex;align-items:center;justify-content:space-between;}
.cd-logo{display:flex;align-items:center;gap:6px;}
.cd-logo-box{width:22px;height:22px;background:#F0C93A;border-radius:6px;display:grid;place-items:center;}
.cd-logo-name{font-size:13px;font-weight:800;color:#fff;}
.cd-url{font-size:11px;color:rgba(255,255,255,.3);direction:ltr;}

.cd-emojis{font-size:48px;margin-bottom:12px;line-height:1;}
/* ── LIGHT CARD ── */
.card-light{
  background:#fff;
  border:2px solid #1a1a1a;
  border-radius:20px;
  padding:32px 28px;
  box-shadow:4px 4px 0 #1a1a1a;
  display:none;
}
.card-light.active{display:block;}
.cl-badge{display:inline-flex;align-items:center;gap:6px;background:#FFF3CD;border:1.5px solid #F0C93A;border-radius:99px;padding:4px 12px;font-size:11px;font-weight:600;color:#8B6914;margin-bottom:20px;}
.cl-name{font-size:36px;font-weight:800;color:#1a1a1a;line-height:1.2;margin-bottom:8px;}
.cl-name span{background:#F0C93A;border:2px solid #1a1a1a;border-radius:8px;padding:0 8px;display:inline-block;}
.cl-desc{font-size:13px;color:#3a3a3a;line-height:1.8;margin-bottom:24px;}
.cl-divider{height:2px;background:#1a1a1a;margin-bottom:20px;}
.cl-footer{display:flex;align-items:center;justify-content:space-between;}
.cl-logo{display:flex;align-items:center;gap:6px;}
.cl-logo-box{width:22px;height:22px;background:#1a1a1a;border-radius:6px;display:grid;place-items:center;}
.cl-logo-name{font-size:13px;font-weight:800;color:#1a1a1a;}
.cl-url{font-size:11px;color:#b0b0a8;direction:ltr;}

/* ── YELLOW CARD ── */
.card-yellow{
  background:#F0C93A;
  border:2px solid #1a1a1a;
  border-radius:20px;
  padding:32px 28px;
  box-shadow:4px 4px 0 #1a1a1a;
  display:none;
}
.card-yellow.active{display:block;}
.cy-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(26,26,26,.1);border:1.5px solid rgba(26,26,26,.2);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:600;color:#1a1a1a;margin-bottom:20px;}
.cy-name{font-size:36px;font-weight:800;color:#1a1a1a;line-height:1.2;margin-bottom:8px;}
.cy-desc{font-size:13px;color:rgba(26,26,26,.7);line-height:1.8;margin-bottom:24px;}
.cy-divider{height:2px;background:rgba(26,26,26,.2);margin-bottom:20px;}
.cy-footer{display:flex;align-items:center;justify-content:space-between;}
.cy-logo{display:flex;align-items:center;gap:6px;}
.cy-logo-box{width:22px;height:22px;background:#1a1a1a;border-radius:6px;display:grid;place-items:center;}
.cy-logo-name{font-size:13px;font-weight:800;color:#1a1a1a;}
.cy-url{font-size:11px;color:rgba(26,26,26,.4);direction:ltr;}

/* SHARE BTNS */
.share-btns{display:flex;flex-direction:column;gap:10px;width:100%;}
.share-btn{
  width:100%;padding:16px;font-size:15px;font-weight:700;
  border:2px solid #1a1a1a;border-radius:14px;
  cursor:pointer;font-family:'IBM Plex Sans Arabic',-apple-system,sans-serif;
  box-shadow:3px 3px 0 #1a1a1a;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.share-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #1a1a1a;}
.btn-screenshot{background:#1a1a1a;color:#F0C93A;}
.btn-x{background:#fff;color:#1a1a1a;}
.btn-wa{background:#E5FFE5;color:#1a1a1a;border-color:#90D890;box-shadow:3px 3px 0 #90D890;}
.btn-wa:active{box-shadow:1px 1px 0 #90D890;}
.btn-tt{background:#000;color:#fff;border-color:#000;box-shadow:3px 3px 0 #000;}
.btn-tt:active{box-shadow:1px 1px 0 #000;}

/* FOOTER */
footer{border-top:2px solid #1a1a1a;background:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;}
.footer-left{display:flex;align-items:center;gap:6px;}
.footer-logo-box{width:20px;height:20px;background:#F0C93A;border:2px solid #1a1a1a;border-radius:6px;display:grid;place-items:center;}
.footer-name{font-size:13px;font-weight:800;}
.footer-copy{font-size:11px;color:#b0b0a8;}
</style>

</head>

  <!-- SHARE BTNS -->

<script>
// ── Teaser lines per archetype (engaging, no private data) ──
const TEASERS = {
  'حصان الشغل':              'الشخص اللي ما يوقف.. حتى لو ما أحد لاحظ. 🐎 شيًك كشف شخصيتك المهنية الحقيقية!',
  'عبقري لكنه منهك':         'موهبة من الدرجة الأولى.. لكن البطارية على وشك تنتهي. 🧠 اكتشف شخصيتك!',
  'مدير بدون منصب':          'يدير الكل بدون ما يعرفون.. ويستاهل لقب ما أخذه بعد! 👔 شيًك حكم عليك.',
  'صاحب الحضور الخطير':      'يدخل الغرفة والكل يحس فيه.. هذي مو مهارة، هذا talent نادر! ⚡',
  'القائد في وقت الأزمات فقط':'في الأزمات يتحول لشخص ثاني تماماً. 🚨 شيًك اكتشف الشخصية الخفية فيك!',
  'صانع القادة':              'سره إنه يخلي الناس حوله أفضل منه — وهذا أصعب شيء في الدنيا! 👑',
  'ملك العلاقات':             'ما في باب ما يفتح له.. والناس تحبه بدون ما يعرف ليش. 🤝 شيًك كشف سرك!',
  'روح الفريق':               'بدونه الفريق يتحول لمجموعة أفراد. 🌟 الشخصية اللي ما تقدّر بثمن!',
  'وجه الشركة':               'يتكلم وتحس الشركة تنبض من ورائه. 🎤 هذا مو موظف، هذا brand!',
  'الموظف السياسي':           'يعرف كيف يلعب اللعبة.. والكل يعرف إنه يعرف. 🎭 شيًك فضحك!',
  'سارق المجهود':             'دايماً في الصورة.. حتى لو ما سوى شيء. 🦹 شيًك كشف من أنت فعلاً!',
  'ضحية كل شي':              'الدنيا ضده.. أو هكذا يؤمن بعمق! 😩 شيًك قال الحقيقة بدون رحمة.',
  'الضائع مهنياً':            'موهوب، شاطر، ومو عارف وين يروح. 🧭 شيًك حدد مسارك الحقيقي!',
  'العائد المتردد':           'قرر يرجع لسوق العمل.. لكن خطوتين للأمام وواحدة للخلف. 🔄',
  'التنين النائم':            'إمكانيات تهز السوق.. لكنها نايمة في انتظار اللحظة المناسبة. 🐉',
  'الفلتة':                   'واحد من ألف.. شيًك عرف إنك مختلف من أول سطر! 💎 اكتشف شخصيتك!',
  'الموهبة المهملة':          'يستاهل أكثر بكثير مما أخذه.. وشيًك شاف ذلك بوضوح. 💔',
  'جاهز بس تنتظر':           'الجهوزية 100%.. لكن الفرصة الصح لسا ما جاءت. ⏳ وقتك قريب!',
  'المنقطع المتمسك':          'ما شاف فرصة أحسن.. لكن قلبه في مكان ثاني. 🪢 شيًك شاف ما بين السطور!',
  'العراب':                   'خلف كل نجاح في الشركة.. اسمه موجود ولو في الظل. 🎩 الشخصية النادرة!',
  'الخبير الصامت':            'يعرف الجواب قبل ما تنتهي من السؤال.. ويفضل ساكت. 🤫 نادر جداً!',
  'المتواضع':                  'إنجازاته تتكلم.. وهو يفضل الصمت. 🙏 شيًك كشف القيمة الحقيقية!',
  'السائح المهني':             'جرب كل شيء.. ولسا يبحث عن الشغفة الحقيقية. 🧳 رحلتك مو خطأ!',
  'صائد الفرص':               'يشوف الفرصة قبل ما تولد.. وينقض عليها في اللحظة الصح. 🎯',
  'الصاروخ':                  'مسيرة مهنية تصاعدية بشكل يخوف.. ولسا ما وصل للقمة! 🚀 اكتشف شخصيتك!',
  'المخضرم':                  'شاف كل شيء، عاش كل شيء.. وعنده حكمة لا تُشترى. 🏛️',
  'الكسول':                   'شيًك ما رحم أحد.. وقال الحقيقة كاملة! 😴 جرب تحلل سيرتك!',
  'صاحب الكاريزما':           'يدخل ويغير الجو.. الناس تنجذب له بدون سبب منطقي. ✨',
  'الأسطورة في عقله':         'في خياله هو أفضل موظف في التاريخ.. شيًك قال رأيه الصريح! 🦁',
  'المتلاعب':                  'ذكي جداً.. لكن شيًك أذكى. 🎲 الحقيقة أحياناً تؤلم!',
  'المخطط اللي ما ينفذ':      'خطط رائعة، أفكار عبقرية.. والتنفيذ دايماً "بكرة". 📝 شيًك عرفك!'
};

// ── Load real data ──
const D        = JSON.parse(localStorage.getItem('cheek_analysis_v2') || 'null');
const archetype = D && D.archetype ? D.archetype : 'شخصيتك المهنية';
const emoji     = D && D.archetype_emoji ? D.archetype_emoji : '🎭';
const desc      = TEASERS[archetype] || 'اكتشف شخصيتك المهنية الحقيقية على شيًك! 🔥 cheekcv.xyz';

// ── Fill DOM cards ──
function nameHTML(type) {
  const parts = archetype.split(' ');
  const last  = parts.pop();
  if (type === 'dark')  return parts.join(' ') + ' <span style="color:#F0C93A">' + last + '</span>';
  if (type === 'light') return parts.join(' ') + ' <span style="background:#F0C93A;border:2px solid #1a1a1a;border-radius:8px;padding:0 8px;display:inline-block">' + last + '</span>';
  return archetype;
}
['dark','light','yellow'].forEach(t => {
  document.getElementById('emoji-' + t).textContent = emoji;
  document.getElementById('name-'  + t).innerHTML   = nameHTML(t);
  document.getElementById('desc-'  + t).textContent = desc;
});

// ── Card switching ──
let activeCard = 'dark';
function switchCard(type, tab) {
  activeCard = type;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.querySelectorAll('.card-dark,.card-light,.card-yellow').forEach(c => c.classList.remove('active'));
  document.getElementById('card-' + type).classList.add('active');
}

// ── Draw card on Canvas (works on all browsers incl. iOS Safari) ──
function drawCard(type) {
  const SIZE = 1080;
  const cv   = document.createElement('canvas');
  cv.width   = SIZE;
  cv.height  = SIZE;
  const ctx  = cv.getContext('2d');
  ctx.textBaseline = 'top';

  const themes = {
    dark:   { bg:'#0A0A0A', card:'#111',  text:'#fff',       sub:'rgba(255,255,255,0.85)', accent:'#F0C93A', border:'rgba(255,255,255,0.1)', url:'rgba(255,255,255,0.3)' },
    light:  { bg:'#FAFAF8', card:'#fff',  text:'#1a1a1a',    sub:'#3a3a3a',               accent:'#F0C93A', border:'#1a1a1a',               url:'#b0b0a8' },
    yellow: { bg:'#F0C93A', card:'#F0C93A',text:'#1a1a1a',   sub:'rgba(26,26,26,0.75)',   accent:'#1a1a1a', border:'rgba(26,26,26,0.2)',    url:'rgba(26,26,26,0.4)' }
  };
  const th = themes[type];
  const font = 'IBM Plex Sans Arabic, Arial, sans-serif';

  // Background
  ctx.fillStyle = th.bg;
  ctx.fillRect(0, 0, SIZE, SIZE);

  // Card rect with rounded corners
  const PAD = 64, R = 40;
  const cw = SIZE - PAD*2, ch = SIZE - PAD*2;
  ctx.fillStyle = th.card;
  ctx.strokeStyle = th.border;
  ctx.lineWidth = type === 'light' ? 3 : 1.5;
  ctx.beginPath();
  ctx.moveTo(PAD + R, PAD);
  ctx.lineTo(PAD + cw - R, PAD);
  ctx.arcTo(PAD+cw, PAD, PAD+cw, PAD+R, R);
  ctx.lineTo(PAD+cw, PAD+ch-R);
  ctx.arcTo(PAD+cw, PAD+ch, PAD+cw-R, PAD+ch, R);
  ctx.lineTo(PAD+R, PAD+ch);
  ctx.arcTo(PAD, PAD+ch, PAD, PAD+ch-R, R);
  ctx.lineTo(PAD, PAD+R);
  ctx.arcTo(PAD, PAD, PAD+R, PAD, R);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Inner padding
  const IX = PAD + 60, IW = cw - 120;
  let Y = PAD + 72;

  // Badge
  ctx.font = 'bold 26px ' + font;
  ctx.fillStyle = th.accent;
  ctx.textAlign = 'right';
  ctx.direction = 'rtl';
  ctx.fillText('🎭 شخصيتك المهنية', IX + IW, Y);
  Y += 52;

  // Emoji
  ctx.font = '90px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(emoji, IX + IW, Y);
  Y += 110;

  // Archetype name — large
  ctx.font = 'bold 74px ' + font;
  ctx.fillStyle = th.text;
  ctx.textAlign = 'right';
  ctx.direction = 'rtl';

  // Wrap long archetype name
  const words = archetype.split(' ');
  let line = '', lineY = Y;
  for (let i = 0; i < words.length; i++) {
    const test = words[i] + (line ? ' ' + line : '');
    if (ctx.measureText(test).width > IW && line) {
      ctx.fillText(line, IX + IW, lineY);
      line = words[i];
      lineY += 90;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, IX + IW, lineY);
  Y = lineY + 104;

  // Divider
  ctx.strokeStyle = th.border;
  ctx.lineWidth = type === 'light' ? 2.5 : 1;
  ctx.beginPath();
  ctx.moveTo(IX, Y); ctx.lineTo(IX + IW, Y);
  ctx.stroke();
  Y += 40;

  // Description — wrapped text
  ctx.font = '30px ' + font;
  ctx.fillStyle = th.sub;
  ctx.textAlign = 'right';
  ctx.direction = 'rtl';
  const maxW = IW;
  const dWords = desc.split(' ');
  let dLine = '', dY = Y;
  for (let i = 0; i < dWords.length; i++) {
    const test = dWords[i] + (dLine ? ' ' + dLine : '');
    if (ctx.measureText(test).width > maxW && dLine) {
      ctx.fillText(dLine, IX + IW, dY);
      dLine = dWords[i];
      dY += 46;
      if (dY > PAD + ch - 120) { ctx.fillText('...', IX + IW, dY); break; }
    } else {
      dLine = test;
    }
  }
  if (dLine) ctx.fillText(dLine, IX + IW, dY);

  // Footer — logo + URL
  const FY = PAD + ch - 72;
  ctx.font = 'bold 28px ' + font;
  ctx.fillStyle = th.text;
  ctx.textAlign = 'right';
  ctx.fillText('شيًك', IX + IW, FY + 6);

  ctx.font = '24px ' + font;
  ctx.fillStyle = th.url;
  ctx.textAlign = 'left';
  ctx.direction = 'ltr';
  ctx.fillText('cheekcv.xyz', IX, FY + 10);

  return cv;
}

// ── Save / Share image ──
async function downloadCard() {
  const btn = document.querySelector('.btn-screenshot');
  btn.textContent = '⏳ جاري...';
  btn.disabled = true;

  try {
    const cv = drawCard(activeCard);
    const filename = 'cheekcv-' + archetype.replace(/\s+/g, '-') + '.png';

    // iOS Safari: use navigator.share with blob if available
    if (navigator.share && navigator.canShare) {
      cv.toBlob(async blob => {
        const file = new File([blob], filename, { type: 'image/png' });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: 'شخصيتي المهنية: ' + archetype });
        } else {
          fallbackDownload(cv, filename);
        }
      }, 'image/png');
    } else {
      fallbackDownload(cv, filename);
    }
  } catch(e) {
    console.error(e);
  }

  btn.innerHTML = '📸 احفظ ككارد';
  btn.disabled = false;
}

function fallbackDownload(cv, filename) {
  const link = document.createElement('a');
  link.download = filename;
  link.href = cv.toDataURL('image/png');
  link.click();
}

function shareX() {
  const text = 'طلعت شخصيتي المهنية "' + archetype + '" على شيًك 👀\nاكتشف شخصيتك: cheekcv.xyz';
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
}

function shareWA() {
  const text = 'طلعت شخصيتي المهنية "' + archetype + '" على شيًك 👀\nاكتشف شخصيتك: cheekcv.xyz';
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

function shareTT() {
  downloadCard();
}
