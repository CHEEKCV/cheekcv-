<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>شيًك — جاري التحليل</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:#0A0A0A;
font-family:'IBM Plex Sans Arabic',sans-serif;
direction:rtl;
color:#fff;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
position:relative;
}

canvas{
position:fixed;
inset:0;
width:100%;
height:100%;
z-index:0;
}

.glow{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:500px;
height:500px;
background:radial-gradient(circle,rgba(240,201,58,.07) 0%,transparent 70%);
pointer-events:none;
z-index:0;
animation:glowPulse 3s ease-in-out infinite;
}

@keyframes glowPulse{
0%,100%{
opacity:.6;
transform:translate(-50%,-50%) scale(1);
}
50%{
opacity:1;
transform:translate(-50%,-50%) scale(1.15);
}
}

.scan{
position:fixed;
left:0;
right:0;
height:2px;
background:linear-gradient(90deg,transparent,rgba(240,201,58,.4),transparent);
z-index:1;
animation:scanLine 3.5s linear infinite;
}

@keyframes scanLine{
0%{top:-2px;}
100%{top:100%;}
}

main{
position:relative;
z-index:2;
width:100%;
max-width:420px;
padding:24px 20px;
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:8px;
margin-bottom:44px;
}

.logo-box{
width:30px;
height:30px;
background:#F0C93A;
border-radius:9px;
display:grid;
place-items:center;
}

.logo-name{
font-size:20px;
font-weight:800;
}

.ring-wrap{
position:relative;
width:110px;
height:110px;
margin-bottom:36px;
}

.ring-outer{
position:absolute;
inset:0;
border-radius:50%;
border:2px solid rgba(240,201,58,.3);
animation:spinRing 6s linear infinite;
}

.ring-outer::before{
content:'';
position:absolute;
top:-4px;
left:50%;
width:8px;
height:8px;
background:#F0C93A;
border-radius:50%;
transform:translateX(-50%);
box-shadow:0 0 14px rgba(240,201,58,.8);
}

.ring-mid{
position:absolute;
inset:14px;
border-radius:50%;
border:1.5px dashed rgba(240,201,58,.15);
animation:spinRing 4s linear infinite reverse;
}

.ring-center{
position:absolute;
inset:26px;
border-radius:50%;
background:rgba(240,201,58,.1);
border:2px solid rgba(240,201,58,.3);
display:grid;
place-items:center;
font-size:26px;
animation:pulseSlow 2s ease-in-out infinite;
}

@keyframes spinRing{
to{
transform:rotate(360deg);
}
}

@keyframes pulseSlow{
0%,100%{
opacity:.8;
transform:scale(1);
}
50%{
opacity:1;
transform:scale(1.05);
}
}

.stage-wrap{
width:100%;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.1);
border-radius:16px;
padding:20px;
margin-bottom:14px;
min-height:68px;
display:flex;
align-items:center;
justify-content:center;
}

.stage-text{
font-size:15px;
font-weight:700;
text-align:center;
line-height:1.6;
}

.teaser-wrap{
width:100%;
background:rgba(240,201,58,.08);
border:1px solid rgba(240,201,58,.25);
border-radius:12px;
padding:14px 16px;
margin-bottom:28px;
min-height:50px;
display:flex;
align-items:center;
justify-content:center;
}

.teaser-text{
font-size:13px;
font-weight:600;
color:#F0C93A;
text-align:center;
line-height:1.6;
}

.progress-wrap{
width:100%;
margin-bottom:8px;
}

.progress-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.progress-label{
font-size:11px;
font-weight:700;
color:rgba(255,255,255,.3);
}

.progress-pct{
font-size:22px;
font-weight:800;
color:#F0C93A;
}

.progress-bar{
height:6px;
background:rgba(255,255,255,.08);
border-radius:99px;
overflow:hidden;
}

.progress-fill{
height:100%;
background:linear-gradient(90deg,#D4A800,#F0C93A);
border-radius:99px;
width:0%;
transition:width .5s ease;
}

.warning{
font-size:12px;
color:rgba(255,255,255,.7);
text-align:center;
margin-top:24px;
font-weight:600;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div class="glow"></div>
<div class="scan"></div>

<main>

<a href="./index.html" style="text-decoration:none;">
<div class="logo">
<div class="logo-box">🧠</div>
<span class="logo-name">شيًك</span>
</div>
</a>

<div class="ring-wrap">
<div class="ring-outer"></div>
<div class="ring-mid"></div>
<div class="ring-center">🧠</div>
</div>

<div class="stage-wrap">
<div class="stage-text" id="stage">
الذكاء الاصطناعي يقرأ ما بين السطور...
</div>
</div>

<div class="teaser-wrap">
<div class="teaser-text" id="teaser">
جاري فحص سيرتك الذاتية...
</div>
</div>

<div class="progress-wrap">

<div class="progress-header">
<span class="progress-label">التحليل جارٍ</span>
<span class="progress-pct" id="pct">0%</span>
</div>

<div class="progress-bar">
<div class="progress-fill" id="fill"></div>
</div>

</div>

<div class="warning">
⚠️ لا تغلق الصفحة · شيًك يعمل على سيرتك الحين
</div>

</main>

<script>

// particles

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = Array.from({length:40},()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
vx:(Math.random()-.5)*0.3,
vy:(Math.random()-.5)*0.3
}));

function animateParticles(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle='rgba(240,201,58,.4)';
ctx.fill();

p.x += p.vx;
p.y += p.vy;

if(p.x<0 || p.x>canvas.width) p.vx *= -1;
if(p.y<0 || p.y>canvas.height) p.vy *= -1;

});

requestAnimationFrame(animateParticles);

}

animateParticles();

// stages

const stages = [
"الذكاء الاصطناعي يقرأ ما بين السطور...",
"تحليل طريقة تقديمك لنفسك...",
"اكتشاف إشارات القيادة المخفية...",
"تحليل الفجوات المهنية...",
"مقارنة خبرتك مع السوق...",
"تحليل شخصيتك المهنية...",
"قياس قيمتك السوقية...",
"بناء النتيجة النهائية..."
];

const teasers = [
"جاري فحص سيرتك الذاتية... 👀",
"شيًك يكتشف أشياء مخفية...",
"يبدو أنك تقلل من قيمتك...",
"السوق يراك بشكل مختلف...",
"جاري بناء التقرير النهائي..."
];

let s = 0;
let t = 0;

const stageEl = document.getElementById('stage');
const teaserEl = document.getElementById('teaser');

setInterval(()=>{
stageEl.textContent = stages[s % stages.length];
s++;
},2000);

setInterval(()=>{
teaserEl.textContent = teasers[t % teasers.length];
t++;
},3000);

// progress

let pct = 0;

const fillEl = document.getElementById('fill');
const pctEl = document.getElementById('pct');

const progress = setInterval(()=>{

pct += Math.random()*4;

if(pct > 100){
pct = 100;
}

fillEl.style.width = pct + '%';
pctEl.textContent = Math.floor(pct) + '%';

if(pct >= 100){

clearInterval(progress);

setTimeout(()=>{

window.location.href = './ascend_paywall.html';

},1500);

}

},300);

// analysis

async function analyzeCV(){

try{

const cvText = localStorage.getItem('cheek_cv_text');

if(!cvText){

localStorage.setItem('cheek_analysis', JSON.stringify({
score:87,
title:"محترف تنفيذي",
market:"قيمة سوقية قوية",
summary:"تم تحليل السيرة الذاتية بنجاح"
}));

return;
}

localStorage.setItem('cheek_analysis', JSON.stringify({
score:91,
title:"قائد عمليات وتشغيل",
market:"طلب مرتفع بالسوق السعودي",
summary:"تم تحليل السيرة الذاتية بنجاح",
cv:cvText.substring(0,500)
}));

}
catch(err){

console.log(err);

localStorage.setItem('cheek_analysis', JSON.stringify({
score:80,
title:"تحليل افتراضي",
market:"جاري التقييم",
summary:"تم إنشاء نتيجة احتياطية"
}));

}

}

analyzeCV();

</script>

</body>
</html>
