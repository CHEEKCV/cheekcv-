<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>شيًك — تقريرك المهني</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#FAFAF8;--white:#fff;--black:#1a1a1a;--yellow:#F0C93A;--yellow-light:#FFF3CD;--yellow-border:#D4A800;--muted:#9b9b9b;--muted2:#b0b0a8;--red:#FFE5E5;--red-border:#FFB3B3;--green:#E5FFE5;--green-border:#90D890;}
body{background:var(--bg);font-family:'IBM Plex Sans Arabic',-apple-system,sans-serif;direction:rtl;color:var(--black);-webkit-font-smoothing:antialiased;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fillBar{from{width:0}to{width:var(--fill)}}
nav{width:100%;background:var(--white);border-bottom:2px solid var(--black);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-box{width:28px;height:28px;background:var(--black);border-radius:9px;border:2px solid var(--black);display:grid;place-items:center;flex-shrink:0;}
.logo-name{font-size:18px;font-weight:800;color:var(--black);}
.nav-tag{font-size:11px;font-weight:600;color:#8B6914;background:var(--yellow-light);border:1.5px solid var(--yellow);border-radius:99px;padding:3px 10px;}
.hero{padding:36px 20px 28px;border-bottom:2px solid var(--black);background:var(--white);animation:fadeUp .5s ease both;text-align:center;}
.archetype-badge{display:inline-flex;align-items:center;gap:6px;background:var(--yellow-light);border:1.5px solid var(--yellow);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:600;color:#8B6914;margin-bottom:20px;}
.hero-name{font-size:44px;font-weight:800;color:var(--black);letter-spacing:-.03em;line-height:1.15;margin-bottom:12px;}
.hero-name span{background:var(--yellow);border:2px solid var(--black);border-radius:8px;padding:0 10px;display:inline-block;}
.hero-sub{font-size:14px;color:#3a3a3a;line-height:1.7;margin-bottom:24px;max-width:520px;margin-right:auto;margin-left:auto;}
.score-strip{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.score-item{background:var(--bg);border:2px solid var(--black);border-radius:12px;padding:14px 20px;box-shadow:3px 3px 0 var(--black);text-align:center;min-width:90px;}
.score-num{display:block;font-size:26px;font-weight:800;color:var(--black);}
.score-label{display:block;font-size:10px;color:var(--muted);margin-top:2px;font-weight:600;}
.main{max-width:640px;margin:0 auto;padding:24px 20px;}
.section{margin-bottom:36px;animation:fadeUp .5s ease both;}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.section-num{font-size:11px;font-weight:700;background:var(--black);color:var(--yellow);padding:3px 8px;border-radius:6px;letter-spacing:1px;}
.section-title{font-size:17px;font-weight:800;color:var(--black);}
.arch-card{background:var(--white);border:2px solid var(--black);border-radius:16px;padding:24px;box-shadow:4px 4px 0 var(--black);}
.arch-card p{font-size:15px;line-height:2;color:var(--black);margin-bottom:16px;}
.arch-card p:last-child{margin-bottom:0;}
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sw-card{background:var(--white);border:2px solid var(--black);border-radius:14px;padding:16px;box-shadow:3px 3px 0 var(--black);}
.sw-card-title{font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:14px;padding-bottom:10px;border-bottom:1.5px solid var(--black);}
.sw-card.str .sw-card-title{color:#27ae60;}.sw-card.wk .sw-card-title{color:#c0392b;}
.sw-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:14px;font-size:14px;line-height:1.8;}
.sw-dot{width:18px;height:18px;border-radius:99px;border:1.5px solid var(--black);display:grid;place-items:center;flex-shrink:0;margin-top:1px;font-size:9px;font-weight:700;}
.str .sw-dot{background:#E5FFE5;color:#27ae60;}.wk .sw-dot{background:var(--red);color:#c0392b;}
.cv-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.cv-stat{background:var(--white);border:2px solid var(--black);border-radius:12px;padding:14px 10px;text-align:center;box-shadow:3px 3px 0 var(--black);}
.cv-stat-num{display:block;font-size:24px;font-weight:800;}
.cv-stat-label{display:block;font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;}
.cv-insights{background:var(--white);border:2px solid var(--black);border-radius:14px;overflow:hidden;box-shadow:4px 4px 0 var(--black);}
.cv-insight{display:flex;gap:14px;padding:16px;border-bottom:1.5px solid #e8e8e0;align-items:flex-start;}
.cv-insight:last-child{border-bottom:none;}
.ci-icon{width:36px;height:36px;background:var(--yellow-light);border:1.5px solid var(--yellow);border-radius:10px;display:grid;place-items:center;font-size:16px;flex-shrink:0;}
.ci-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:4px;}
.ci-text{font-size:14px;line-height:1.9;color:var(--black);}
.rec-list{display:flex;flex-direction:column;gap:10px;}
.rec-item{background:var(--white);border:2px solid var(--black);border-radius:14px;padding:16px;display:flex;gap:14px;align-items:flex-start;box-shadow:3px 3px 0 var(--black);}
.rec-num{width:32px;height:32px;background:var(--yellow);border:2px solid var(--black);border-radius:8px;display:grid;place-items:center;font-size:14px;font-weight:800;flex-shrink:0;}
.rec-title{font-size:15px;font-weight:700;margin-bottom:8px;}.rec-desc{font-size:13px;color:#3a3a3a;line-height:1.9;}
.paths-list{display:flex;flex-direction:column;gap:10px;}
.path-item{background:var(--white);border:2px solid var(--black);border-radius:14px;padding:16px;display:flex;gap:14px;align-items:flex-start;box-shadow:3px 3px 0 var(--black);}
.path-icon-box{width:44px;height:44px;background:var(--yellow-light);border:2px solid var(--yellow-border);border-radius:12px;display:grid;place-items:center;font-size:20px;flex-shrink:0;}
.path-title{font-size:15px;font-weight:700;margin-bottom:8px;}.path-desc{font-size:13px;color:#3a3a3a;line-height:1.9;margin-bottom:10px;}
.path-badge{display:inline-block;font-size:11px;font-weight:700;background:var(--black);color:var(--yellow);padding:3px 10px;border-radius:99px;}
.courses-list{display:flex;flex-direction:column;gap:10px;}
.course-item{background:var(--white);border:2px solid var(--black);border-radius:14px;padding:16px;box-shadow:3px 3px 0 var(--black);}
.course-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;}
.course-num{font-size:22px;font-weight:800;color:#D0D0C8;flex-shrink:0;line-height:1;}
.course-title{font-size:14px;font-weight:700;line-height:1.4;}
.course-reason{background:var(--yellow-light);border-right:3px solid var(--yellow);border-radius:0 8px 8px 0;padding:12px 14px;font-size:13px;color:#8B6914;line-height:1.9;}
.market-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.market-card{background:var(--white);border:2px solid var(--black);border-radius:14px;padding:16px;box-shadow:3px 3px 0 var(--black);}
.market-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:8px;}
.market-value{font-size:13px;line-height:1.9;color:var(--black);}
.demand-bar{height:8px;background:#e8e8e0;border-radius:99px;border:1px solid #D0D0C8;margin-top:10px;overflow:hidden;}
.demand-fill{height:100%;background:var(--yellow);border-radius:99px;width:0;animation:fillBar 1.2s ease forwards;animation-fill-mode:forwards;}
.jobs-list{display:flex;flex-direction:column;gap:10px;}
.job-item{background:var(--white);border:2px solid var(--black);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:14px;box-shadow:3px 3px 0 var(--black);}
.job-title{font-size:14px;font-weight:700;margin-bottom:6px;}.job-reason{font-size:13px;color:#3a3a3a;line-height:1.8;}
.job-salary{text-align:left;direction:ltr;background:var(--yellow-light);border:1.5px solid var(--yellow);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;color:#8B6914;white-space:nowrap;flex-shrink:0;line-height:1.5;}
.action-btns{display:flex;gap:10px;padding:0 20px 32px;max-width:640px;margin:0 auto;}
.action-btn{flex:1;padding:16px;font-size:15px;font-weight:800;border:2px solid var(--black);border-radius:14px;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;box-shadow:3px 3px 0 var(--black);transition:all .15s;}
.action-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--black);}
.btn-pdf{background:var(--black);color:var(--yellow);}
.btn-share{background:var(--yellow);color:var(--black);border-color:var(--yellow-border);box-shadow:3px 3px 0 var(--yellow-border);}
footer{border-top:2px solid var(--black);background:var(--white);padding:14px 20px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.footer-left{display:flex;align-items:center;gap:6px;}
.footer-logo-box{width:20px;height:20px;background:var(--yellow);border:2px solid var(--black);border-radius:6px;display:grid;place-items:center;}
.footer-name{font-size:13px;font-weight:800;}
.footer-copy{font-size:11px;color:#1a1a1a;font-weight:600;}
@media print{nav,footer,.action-btns{display:none!important;}body{background:#fff;}.section{animation:none;opacity:1;}}
@media(max-width:500px){.sw-grid,.market-grid,.cv-stats{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" style="text-decoration:none;">
    <div class="logo">
      <div class="logo-box">
        <svg width="15" height="15" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="8" r="2.5" fill="#F0C93A"/>
          <circle cx="8" cy="20" r="2.5" fill="#fff"/><circle cx="20" cy="20" r="2.5" fill="#fff"/>
          <circle cx="14" cy="15" r="1.8" fill="#fff" fill-opacity=".6"/>
          <line x1="14" y1="10.5" x2="14" y2="13.2" stroke="#fff" stroke-width="1.6"/>
          <line x1="14" y1="16.8" x2="9.2" y2="18.5" stroke="#fff" stroke-width="1.6"/>
          <line x1="14" y1="16.8" x2="18.8" y2="18.5" stroke="#fff" stroke-width="1.6"/>
        </svg>
      </div>
      <span class="logo-name">شيًك</span>
    </div>
  </a>
  <div class="nav-tag">التقرير المهني</div>
</nav>

<div class="hero" id="hero">
  <div class="archetype-badge">🎭 شخصيتك المهنية</div>
  <h1 class="hero-name" id="heroName">جاري التحميل...</h1>
  <p class="hero-sub" id="heroSub"></p>
  <div class="score-strip" id="scoreStrip"></div>
</div>

<div class="main" id="reportMain"></div>

<div class="action-btns">
  <button class="action-btn btn-pdf" onclick="window.print()">📄 حفظ كـ PDF</button>
  <button class="action-btn btn-share" onclick="window.location.href='ascend_sharecard.html'">📸 شارك شخصيتك</button>
</div>

<footer>
  <div class="footer-left">
    <div class="footer-logo-box">
      <svg width="11" height="11" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="8" r="2.5" fill="#1a1a1a"/>
        <circle cx="8" cy="20" r="2.5" fill="#1a1a1a"/><circle cx="20" cy="20" r="2.5" fill="#1a1a1a"/>
        <line x1="14" y1="10.5" x2="14" y2="13.2" stroke="#1a1a1a" stroke-width="1.6"/>
        <line x1="14" y1="16.8" x2="9.2" y2="18.5" stroke="#1a1a1a" stroke-width="1.6"/>
        <line x1="14" y1="16.8" x2="18.8" y2="18.5" stroke="#1a1a1a" stroke-width="1.6"/>
      </svg>
    </div>
    <span class="footer-name">شيًك</span>
  </div>
  <div class="footer-copy">صُنع بـ ❤️ في الرياض · © 2026</div>
</footer>

<script>
// Try v2 first, fallback to v1 for compatibility
let D = JSON.parse(localStorage.getItem('cheek_analysis_v2') || 'null');

// Clear stale data from old system (pre-background-function) that lacks status:'done'
if (D && D.status !== 'done') {
  localStorage.removeItem('cheek_analysis_v2');
  localStorage.removeItem('cheek_analysis');
  D = null;
}

function showNoData() {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;padding:20px;text-align:center;font-family:IBM Plex Sans Arabic,sans-serif;direction:rtl;"><div style="font-size:48px;margin-bottom:16px;">⚠️</div><h2 style="margin-bottom:12px;">لا يوجد تحليل</h2><p style="color:#666;margin-bottom:24px;">يبدو إنك دخلت هذي الصفحة بدون تحليل سيرة ذاتية.</p><button onclick="window.location.href=\'index.html\'" style="background:#F0C93A;color:#1a1a1a;border:2px solid #1a1a1a;border-radius:12px;padding:14px 28px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;">ارفع سيرتك الآن</button></div>';
}

if (!D || !D.archetype) {
  showNoData();
  throw new Error('No analysis data');
}
const d = D;

// Save archetype for share card
localStorage.setItem('cheek_archetype', d.archetype);
localStorage.setItem('cheek_archetype_en', d.archetype_en || '');
localStorage.setItem('cheek_archetype_emoji', d.archetype_emoji || '🎭');
localStorage.setItem('cheek_description', d.description || '');

// Build hero
const nameParts = d.archetype.split(' ');
const lastWord = nameParts.pop();
document.getElementById('heroName').innerHTML = `${nameParts.join(' ')} <span>${lastWord}</span>`;
document.getElementById('heroSub').textContent = d.description ? d.description.split('\n')[0] : d.market_view;

const trend = d.career_trend === 'صاعد' ? '↗' : d.career_trend === 'نازل' ? '↘' : d.career_trend || '↗';
document.getElementById('scoreStrip').innerHTML = `
  <div class="score-item"><span class="score-num">${d.years_experience}+</span><span class="score-label">سنوات خبرة</span></div>
  <div class="score-item"><span class="score-num">${d.companies_count}</span><span class="score-label">شركات</span></div>
  <div class="score-item"><span class="score-num">${d.market_demand}%</span><span class="score-label">الطلب في السوق</span></div>
  <div class="score-item"><span class="score-num">${trend}</span><span class="score-label">اتجاه المسيرة</span></div>
`;

// Build report sections
const main = document.getElementById('reportMain');

function section(num, title, content) {
  return `<div class="section"><div class="section-head"><span class="section-num">${num}</span><span class="section-title">${title}</span></div>${content}</div>`;
}

// 01 Archetype
const descLines = (d.description || '').split('\n').filter(l=>l.trim()).map(l=>`<p>${l}</p>`).join('');
main.innerHTML += section('01','شخصيتك المهنية',`<div class="arch-card">${descLines || '<p>'+d.market_view+'</p>'}</div>`);

// 02 SW
const strItems = (d.strengths||[]).map(s=>`<div class="sw-item"><div class="sw-dot">✓</div><div>${s}</div></div>`).join('');
const wkItems = (d.weaknesses||[]).map(w=>`<div class="sw-item"><div class="sw-dot">✕</div><div>${w}</div></div>`).join('');
main.innerHTML += section('02','نقاط القوة والضعف',`<div class="sw-grid"><div class="sw-card str"><div class="sw-card-title">✦ نقاط القوة</div>${strItems}</div><div class="sw-card wk"><div class="sw-card-title">✦ نقاط الضعف</div>${wkItems}</div></div>`);

// 03 CV Analysis
const statsHtml = `<div class="cv-stats"><div class="cv-stat"><span class="cv-stat-num">${d.years_experience}+</span><span class="cv-stat-label">سنوات خبرة</span></div><div class="cv-stat"><span class="cv-stat-num">${d.companies_count}</span><span class="cv-stat-label">شركات</span></div><div class="cv-stat"><span class="cv-stat-num">0</span><span class="cv-stat-label">فجوات زمنية</span></div></div>`;
const insightsHtml = `<div class="cv-insights">${(d.cv_insights||[]).map(i=>`<div class="cv-insight"><div class="ci-icon">${i.icon}</div><div><div class="ci-label">${i.label}</div><div class="ci-text">${i.text}</div></div></div>`).join('')}</div>`;
main.innerHTML += section('03','تحليل السيرة الذاتية', statsHtml + insightsHtml);

// 04 Recommendations
const recsHtml = `<div class="rec-list">${(d.recommendations||[]).map((r,i)=>`<div class="rec-item"><div class="rec-num">${i+1}</div><div><div class="rec-title">${r.title}</div><div class="rec-desc">${r.desc}</div></div></div>`).join('')}</div>`;
main.innerHTML += section('04','توصيات التطوير', recsHtml);

// 05 Career Paths
const pathsHtml = `<div class="paths-list">${(d.career_paths||[]).map(p=>`<div class="path-item"><div class="path-icon-box">${p.icon}</div><div><div class="path-title">${p.title}</div><div class="path-desc">${p.desc}</div><span class="path-badge">توافق ${p.match}%</span></div></div>`).join('')}</div>`;
main.innerHTML += section('05','المسارات المهنية المناسبة', pathsHtml);

// 06 Courses
const coursesHtml = `<div class="courses-list">${(d.courses||[]).map(c=>`<div class="course-item"><div class="course-header"><div class="course-num">${c.num}</div><div class="course-title">${c.title}</div></div><div class="course-reason">${c.reason}</div></div>`).join('')}</div>`;
main.innerHTML += section('06','الدورات الموصى بها', coursesHtml);

// 07 Market
const marketHtml = `<div class="market-grid">${(d.market_cards||[]).map(m=>`<div class="market-card"><div class="market-label">${m.label}</div><div class="market-value">${m.text}</div>${m.has_bar?`<div class="demand-bar"><div class="demand-fill" style="--fill:${m.bar_pct}%"></div></div>`:''}</div>`).join('')}</div>`;
main.innerHTML += section('07','تقييم السوق', marketHtml);

// 08 Jobs
const jobsHtml = `<div class="jobs-list">${(d.jobs||[]).map(j=>`<div class="job-item"><div><div class="job-title">${j.title}</div><div class="job-reason">${j.reason}</div></div><div class="job-salary">${j.salary}</div></div>`).join('')}</div>`;
main.innerHTML += section('08','الوظائف التي يمكنك الوصول إليها', jobsHtml);
</script>
</body>
</html>
