<script>

const D = JSON.parse(localStorage.getItem('cheek_analysis') || 'null');

if(!D){

document.body.innerHTML = `
<div style="
padding:40px;
font-family:sans-serif;
text-align:center;
direction:rtl;
background:#FAFAF8;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:14px;
">

<h1 style="font-size:32px;">❌ فشل تحميل التحليل الحقيقي</h1>

<p style="font-size:18px;color:#555;max-width:500px;line-height:1.8;">
ما وصل أي تحليل من Claude API.<br>
تأكد أن analyze.js يرجّع JSON صحيح.
</p>

<a href="./index.html" style="
background:#111;
color:#fff;
padding:14px 24px;
border-radius:12px;
text-decoration:none;
font-weight:700;
">
الرجوع للرئيسية
</a>

</div>
`;

throw new Error("No analysis data found");

}

const d = D;

// Save archetype for share card
localStorage.setItem('cheek_archetype', d.archetype || '');
localStorage.setItem('cheek_archetype_en', d.archetype_en || '');
localStorage.setItem('cheek_archetype_emoji', d.archetype_emoji || '🎭');
localStorage.setItem('cheek_description', d.description || '');

// Build hero
const nameParts = (d.archetype || 'شخصية مجهولة').split(' ');
const lastWord = nameParts.pop();

document.getElementById('heroName').innerHTML =
`${nameParts.join(' ')} <span>${lastWord}</span>`;

document.getElementById('heroSub').textContent =
(d.description || d.market_view || '').split('\n')[0];

const trend =
d.career_trend === 'صاعد' ? '↗' :
d.career_trend === 'نازل' ? '↘' :
d.career_trend || '↗';

document.getElementById('scoreStrip').innerHTML = `
<div class="score-item">
<span class="score-num">${d.years_experience || 0}+</span>
<span class="score-label">سنوات خبرة</span>
</div>

<div class="score-item">
<span class="score-num">${d.companies_count || 0}</span>
<span class="score-label">شركات</span>
</div>

<div class="score-item">
<span class="score-num">${d.market_demand || 0}%</span>
<span class="score-label">الطلب في السوق</span>
</div>

<div class="score-item">
<span class="score-num">${trend}</span>
<span class="score-label">اتجاه المسيرة</span>
</div>
`;

const main = document.getElementById('reportMain');

function section(num,title,content){
return `
<div class="section">
<div class="section-head">
<span class="section-num">${num}</span>
<span class="section-title">${title}</span>
</div>
${content}
</div>
`;
}

// 01
const descLines = (d.description || '')
.split('\n')
.filter(l=>l.trim())
.map(l=>`<p>${l}</p>`)
.join('');

main.innerHTML += section(
'01',
'شخصيتك المهنية',
`<div class="arch-card">${descLines}</div>`
);

// 02
const strItems = (d.strengths || [])
.map(s=>`
<div class="sw-item">
<div class="sw-dot">✓</div>
<div>${s}</div>
</div>
`).join('');

const wkItems = (d.weaknesses || [])
.map(w=>`
<div class="sw-item">
<div class="sw-dot">✕</div>
<div>${w}</div>
</div>
`).join('');

main.innerHTML += section(
'02',
'نقاط القوة والضعف',
`
<div class="sw-grid">

<div class="sw-card str">
<div class="sw-card-title">✦ نقاط القوة</div>
${strItems}
</div>

<div class="sw-card wk">
<div class="sw-card-title">✦ نقاط الضعف</div>
${wkItems}
</div>

</div>
`
);

// 03
const insightsHtml = `
<div class="cv-insights">

${(d.cv_insights || []).map(i=>`

<div class="cv-insight">

<div class="ci-icon">${i.icon}</div>

<div>
<div class="ci-label">${i.label}</div>
<div class="ci-text">${i.text}</div>
</div>

</div>

`).join('')}

</div>
`;

main.innerHTML += section(
'03',
'تحليل السيرة الذاتية',
insightsHtml
);

// 04
const recsHtml = `
<div class="rec-list">

${(d.recommendations || []).map((r,i)=>`

<div class="rec-item">

<div class="rec-num">${i+1}</div>

<div>
<div class="rec-title">${r.title}</div>
<div class="rec-desc">${r.desc}</div>
</div>

</div>

`).join('')}

</div>
`;

main.innerHTML += section(
'04',
'توصيات التطوير',
recsHtml
);

// 05
const jobsHtml = `
<div class="jobs-list">

${(d.jobs || []).map(j=>`

<div class="job-item">

<div>
<div class="job-title">${j.title}</div>
<div class="job-reason">${j.reason}</div>
</div>

<div class="job-salary">${j.salary}</div>

</div>

`).join('')}

</div>
`;

main.innerHTML += section(
'05',
'الوظائف المناسبة لك',
jobsHtml
);

</script>
